codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

flags:
  backend:
    paths:
      - backend/
  frontend:
    paths:
      - frontend/

status:
  project:
    default:
      target: auto
      threshold: 1%
    # Tell Codecov to track the frontend percentage separately
    frontend:
      target: auto
      flags:
        - frontend
    # Tell Codecov to track the backend percentage separately
    backend:
      target: auto
      flags:
        - backend
  patch:
    default:
      target: auto
      threshold: 1%
