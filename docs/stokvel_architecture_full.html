    <title>Stokvel SD — Full Architecture</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #fff;
        border-bottom: 1px solid #e0e0e0;
        padding: 9px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      #toolbar strong {
        font-size: 14px;
        color: #111;
      }
      .hint {
        font-size: 12px;
        color: #888;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 14px;
        border-radius: 7px;
        border: none;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .btn-primary {
        background: #1d4ed8;
        color: #fff;
      }
      .btn-secondary {
        background: #e5e7eb;
        color: #374151;
      }
      #status {
        font-size: 12px;
        color: #059669;
        display: none;
      }
      #wrap {
        width: 100%;
        overflow: auto;
        cursor: grab;
        padding: 24px;
        background: #f5f5f5;
      }
      #wrap:active {
        cursor: grabbing;
      }
      #diagram-container {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        display: inline-block;
        padding: 20px;
      }
      svg text {
        font-family: system-ui, sans-serif;
      }
      #legend {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        padding: 10px 18px;
        background: #f9f9f9;
        border-top: 1px solid #e8e8e8;
        font-size: 12px;
        color: #555;
        align-items: center;
      }
      .li {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .sw {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        flex-shrink: 0;
      }
    </style>
  </head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
      const wrap = document.getElementById("wrap");
      let drag = false,
        sx = 0,
        sy = 0,
        sl = 0,
        st = 0;
      wrap.addEventListener("mousedown", (e) => {
        drag = true;
        sx = e.clientX;
        sy = e.clientY;
        sl = wrap.scrollLeft;
        st = wrap.scrollTop;
      });
      wrap.addEventListener("mousemove", (e) => {
        if (!drag) return;
        wrap.scrollLeft = sl - (e.clientX - sx);
        wrap.scrollTop = st - (e.clientY - sy);
      });
      wrap.addEventListener("mouseup", () => (drag = false));
      wrap.addEventListener("mouseleave", () => (drag = false));

      function showStatus() {
        const s = document.getElementById("status");
        s.style.display = "inline";
        setTimeout(() => (s.style.display = "none"), 2500);
      }

      function exportPNG() {
        const btn = event.target;
        btn.textContent = "⏳ Rendering...";
        btn.disabled = true;
        html2canvas(document.getElementById("diagram-container"), {
          scale: 2,
          backgroundColor: "#ffffff",
          useCORS: true,
          logging: false,
        }).then((c) => {
          const a = document.createElement("a");
          a.download = "stokvel_architecture_full.png";
          a.href = c.toDataURL("image/png");
          a.click();
          btn.textContent = "⬇ Export PNG";
          btn.disabled = false;
          showStatus();
        });
      }

      function exportSVG() {
        const svg = document.getElementById("diag");
        const blob = new Blob([svg.outerHTML], {
          type: "image/svg+xml;charset=utf-8",
        });
        const a = document.createElement("a");
        a.download = "stokvel_architecture_full.svg";
        a.href = URL.createObjectURL(blob);
        a.click();
        showStatus();
      }
    </script>
